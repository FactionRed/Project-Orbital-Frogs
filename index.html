<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Orbital Frogs</title>
    <!-- Inline loader styles so the loading screen paints before the JS bundle parses. -->
    <style>
      #loader {
        position: fixed; inset: 0; z-index: 100;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #05060a; color: #cdd; font-family: 'Segoe UI', system-ui, sans-serif;
        transition: opacity 0.6s ease;
      }
      #loader.fading { opacity: 0; pointer-events: none; }
      #loader .title {
        font-size: 48px; font-weight: 300; letter-spacing: 6px; margin-bottom: 8px;
        background: linear-gradient(180deg, #cfe0ff, #5a7bbf);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        text-shadow: 0 2px 20px rgba(0,0,0,0.8);
      }
      #loader .subtitle { font-size: 12px; color: #8a9ab5; letter-spacing: 3px; margin-bottom: 36px; text-transform: uppercase; text-shadow: 0 1px 8px rgba(0,0,0,0.9); }
      #loader .bar-track { width: 260px; height: 4px; background: rgba(26,34,56,0.8); border-radius: 2px; overflow: hidden; backdrop-filter: blur(4px); }
      #loader .bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #2a6, #4af); transition: width 0.2s ease; }
      #loader .pct { font-size: 11px; color: #8a9ab5; margin-top: 12px; font-family: monospace; letter-spacing: 1px; text-shadow: 0 1px 4px rgba(0,0,0,0.9); }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <!-- Loading overlay: visible immediately on first paint, removed by main.ts once init completes. -->
    <div id="loader">
      <div class="title">Project Orbital Frogs</div>
      <div class="subtitle">Loading…</div>
      <div class="bar-track"><div class="bar-fill"></div></div>
      <div class="pct">0%</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
